name: build

on:
  push:
  pull_request:

jobs:
  build-mac:
    name: macOS / clang
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: sh ./build_mac.sh

  build-linux:
    name: Linux / gcc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sh ./build_linux.sh

  build-windows:
    name: Windows / MinGW-w64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: build_win64.cmd
        shell: cmd
        
