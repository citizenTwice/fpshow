name: build

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS / clang
            os: macos-latest
            script: ./build_mac.sh
            shell: bash

#          - name: Linux / gcc
#            os: ubuntu-latest
#            script: ./build_linux.sh
#            shell: bash
#
#          - name: Windows / MinGW-w64
#            os: windows-latest
#            script: build_win64.cmd
#            shell: cmd

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build
        shell: ${{ matrix.shell }}
        run: ${{ matrix.script }}