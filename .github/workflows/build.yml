name: build

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS / clang
            os: macos-latest
            target: mac

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build macOS
        if: matrix.target == 'mac'
        shell: bash
        run: sh ./build_mac.sh
